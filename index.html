      <!-- Body text 1: left-aligned, slides in from left during Phase 2 -->
      <g id="bodytext1" opacity="0">
        <text font-family="BodyFont, Georgia, serif"
              font-size="0.18"
              fill="#000000"
              x="871.5" y="931.8"
              text-anchor="start">
          <tspan x="871.5" dy="0">Allow me to speak plainly: no traveler of taste, no seeker of</tspan>
          <tspan x="871.5" dy="0.24">pleasure, and no admirer of fine experience ought to deny</tspan>
          <tspan x="871.5" dy="0.24">himself a night upon this magnificent steamer.</tspan>
        </text>
      </g>

      <!-- Body text 2: right-aligned, slides in from right during Phase 3 -->
      <g id="bodytext2" opacity="0">
        <text font-family="BodyFont, Georgia, serif"
              font-size="0.18"
              fill="#000000"
              x="882.3" y="934.2"
              text-anchor="end">
          <tspan x="882.3" dy="0">From the very instant I crossed the gangway, I found</tspan>
          <tspan x="882.3" dy="0.24">myself received not as a mere passenger, but as a guest of</tspan>
          <tspan x="882.3" dy="0.24">consequence. The entrance was bright with polished wood,</tspan>
          <tspan x="882.3" dy="0.24">shining lamps, and such order, elegance, and attentive</tspan>
          <tspan x="882.3" dy="0.24">service that the ordinary inconveniences of travel seemed</tspan>
          <tspan x="882.3" dy="0.24">instantly banished from the earth.</tspan>
        </text>
      </g>

      <!-- Body text 3: center-aligned, fades up from center in Phase 4 -->
      <g id="bodytext3" opacity="0">
        <text font-family="BodyFont, Georgia, serif"
              font-size="0.18"
              fill="#000000"
              x="876.9" y="930.4"
              text-anchor="middle">
          <tspan x="876.9" dy="0">The entrance was bright with polished wood, shining</tspan>
          <tspan x="876.9" dy="0.24">lamps, and such order, elegance, and attentive service that</tspan>
          <tspan x="876.9" dy="0.24">the ordinary inconveniences of travel seemed instantly</tspan>
          <tspan x="876.9" dy="0.24">banished from the earth. The deck itself was a triumph.</tspan>
          <tspan x="876.9" dy="0.24">Broad, handsome, and alive with activity, it offered the</tspan>
          <tspan x="876.9" dy="0.24">finest station from which to enjoy the river air and the</tspan>
          <tspan x="876.9" dy="0.24">moonlit spectacle of the great water.</tspan>
        </text>
      </g>

      <!-- Second illustration: chamber image, appears below text 3 in Phase 4 -->
      <image id="chamber"
             href="images/chamber.jpg"
             x="872.9" y="932.0"
             width="8.0" height="5.98"
             preserveAspectRatio="xMidYMid meet"
             opacity="0"/>

      <!-- Body text 4: center-aligned, fades up after chamber centers in Phase 6 -->
      <g id="bodytext4" opacity="0">
        <text font-family="BodyFont, Georgia, serif"
              font-size="0.18"
              fill="#000000"
              x="876.9" y="932.5"
              text-anchor="middle">
          <tspan x="876.9" dy="0">Ladies and gentlemen moved about in their best attire,</tspan>
          <tspan x="876.9" dy="0.24">exchanging conversation beneath the open sky, while the</tspan>
          <tspan x="876.9" dy="0.24">vessel advanced with noble confidence through the dark</tspan>
          <tspan x="876.9" dy="0.24">current. Every rail gleamed, every light was warm and</tspan>
          <tspan x="876.9" dy="0.24">inviting, and every detail seemed arranged for comfort,</tspan>
          <tspan x="876.9" dy="0.24">amusement, and admiration. One did not simply travel—one</tspan>
          <tspan x="876.9" dy="0.24">appeared, one delighted, one became part of a scene</tspan>
          <tspan x="876.9" dy="0.24">worthy of remembrance.</tspan>
        </text>
      </g>

      <!-- Body text 5: left-aligned, slides in from left after glass sequence -->
      <g id="bodytext5" opacity="0">
        <text font-family="BodyFont, Georgia, serif"
              font-size="0.18"
              fill="#000000"
              x="871.5" y="931.8"
              text-anchor="start">
          <tspan x="871.5" dy="0">And the chambers! Here, too, the excellence of the steamer</tspan>
          <tspan x="871.5" dy="0.24">declared itself without hesitation. My room was neat, elegant,</tspan>
          <tspan x="871.5" dy="0.24">and exceedingly well-appointed, furnished with fresh linen,</tspan>
          <tspan x="871.5" dy="0.24">tasteful fittings, and every arrangement necessary for an</tspan>
          <tspan x="871.5" dy="0.24">agreeable night's repose.</tspan>
        </text>
      </g>

      <!-- Body text 6: right-aligned, slides in from right after glass sequence -->
      <g id="bodytext6" opacity="0">
        <text font-family="BodyFont, Georgia, serif"
              font-size="0.18"
              fill="#000000"
              x="882.3" y="934.2"
              text-anchor="end">
          <tspan x="882.3" dy="0">There was in the whole vessel an air of refinement so</tspan>
          <tspan x="882.3" dy="0.24">complete that one might almost forget the roughness of the</tspan>
          <tspan x="882.3" dy="0.24">outer world altogether. On such a boat, the river ceases to</tspan>
          <tspan x="882.3" dy="0.24">be an obstacle and becomes instead a stage for pleasure,</tspan>
          <tspan x="882.3" dy="0.24">grandeur, and marvel.</tspan>
        </text>
      </g>

      <!-- Body text 7: center-aligned, fades up after subtitle 2 exits -->
      <g id="bodytext7" opacity="0">
        <text font-family="BodyFont, Georgia, serif"
              font-size="0.18"
              fill="#000000"
              x="876.9" y="932.9"
              text-anchor="middle">
          <tspan x="876.9" dy="0">For the true wonder of the journey begins when the</tspan>
          <tspan x="876.9" dy="0.24">night deepens and the full moon rises over the</tspan>
          <tspan x="876.9" dy="0.24">Mississippi. I stood upon the deck long after many had</tspan>
          <tspan x="876.9" dy="0.24">retired, and there beheld such a spectacle as no</tspan>
          <tspan x="876.9" dy="0.24">common excursion could ever promise.</tspan>
        </text>
      </g>

      <!-- Body text 8: center-aligned, fades up after bt7 exits -->
      <g id="bodytext8" opacity="0">
        <text font-family="BodyFont, Georgia, serif"
              font-size="0.18"
              fill="#000000"
              x="876.9" y="933.0"
              text-anchor="middle">
          <tspan x="876.9" dy="0">The moon hung above the river with a majesty so</tspan>
          <tspan x="876.9" dy="0.24">complete that the water no longer looked like water,</tspan>
          <tspan x="876.9" dy="0.24">but like some vast silver surface spread out for the</tspan>
          <tspan x="876.9" dy="0.24">passage of dreams.</tspan>
        </text>
      </g>

      <!-- Moon: large circular image, rises from bottom to center -->
      <image id="moon"
             href="images/moon.png"
             x="869.9" y="932"
             width="14" height="14"
             preserveAspectRatio="xMidYMid meet"
             opacity="0"/>

      <!-- Body text 9: left-aligned, slides in from left (like bt1) -->
      <g id="bodytext9" opacity="0">
        <text font-family="BodyFont, Georgia, serif"
              font-size="0.18"
              fill="#000000"
              x="871.5" y="931.8"
              text-anchor="start">
          <tspan x="871.5" dy="0">The boat seemed no longer merely to sail, but to glide</tspan>
          <tspan x="871.5" dy="0.24">through another order of reality altogether.</tspan>
        </text>
      </g>

      <!-- Body text 10: right-aligned, slides in from right (like bt2) -->
      <g id="bodytext10" opacity="0">
        <text font-family="BodyFont, Georgia, serif"
              font-size="0.18"
              fill="#000000"
              x="882.3" y="934.2"
              text-anchor="end">
          <tspan x="882.3" dy="0">The farther we moved into that radiant night, the</tspan>
          <tspan x="882.3" dy="0.24">stranger and grander everything became.</tspan>
        </text>
      </g>

      <!-- Body text 11: center-aligned, lens distortion effect -->
      <g id="bodytext11" opacity="0">
        <text font-family="BodyFont, Georgia, serif"
              font-size="0.18"
              fill="#000000"
              x="876.9" y="931.0"
              text-anchor="middle">
          <tspan x="876.9" dy="0">The river widened beyond all natural measure. The deck</tspan>
          <tspan x="876.9" dy="0.24">behind me seemed to stretch into impossible length. The</tspan>
          <tspan x="876.9" dy="0.24">lamps burned with an unearthly steadiness. The moon's</tspan>
          <tspan x="876.9" dy="0.24">reflection broke and multiplied until it seemed that a</tspan>
          <tspan x="876.9" dy="0.24">hundred moons were opening beneath us.</tspan>
        </text>
      </g>

      <!-- Body text 12: center-aligned, reverse lens entrance -->
      <g id="bodytext12" opacity="0">
        <text font-family="BodyFont, Georgia, serif"
              font-size="0.18"
              fill="#000000"
              x="876.9" y="932.5"
              text-anchor="middle">
          <tspan x="876.9" dy="0">All familiar things—wood, iron, water, air—appeared</tspan>
          <tspan x="876.9" dy="0.24">to loosen from their ordinary form.</tspan>
        </text>
      </g>

      <!-- Body text 13: center-aligned, entrance from below with continuous font mutation -->
      <g id="bodytext13" opacity="0">
        <text font-family="BodyFont, Georgia, serif"
              font-size="0.18"
              fill="#000000"
              x="876.9" y="932.0"
              text-anchor="middle">
          <tspan x="876.9" dy="0">The world did not end; it expanded, melted, and unfolded</tspan>
          <tspan x="876.9" dy="0.24">into something vast, dazzling, and beyond the limits</tspan>
          <tspan x="876.9" dy="0.24">of common human understanding.</tspan>
        </text>
      </g>

      <!-- Body text 14: white on black, centered, calm reveal -->
      <g id="bodytext14" opacity="0">
        <text font-family="BodyFont, Georgia, serif"
              font-size="0.18"
              fill="#FFFFFF"
              x="876.9" y="931.5"
              text-anchor="middle">
          <tspan x="876.9" dy="0">And yet the steamer held on, splendid and calm,</tspan>
          <tspan x="876.9" dy="0.24">as though built not merely for travel, but for passage</tspan>
          <tspan x="876.9" dy="0.24">through mystery itself. That is the excellence of this</tspan>
          <tspan x="876.9" dy="0.24">excursion: not only luxury, not only comfort, not only</tspan>
          <tspan x="876.9" dy="0.24">society and spectacle, but an encounter with the sublime.</tspan>
          <tspan x="876.9" dy="0.24">Take this voyage, and you shall not merely see the moon</tspan>
          <tspan x="876.9" dy="0.24">over the Mississippi—you shall feel the very frame</tspan>
          <tspan x="876.9" dy="0.24">of reality tremble beneath its light.</tspan>
        </text>
      </g>
